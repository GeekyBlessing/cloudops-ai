# SPA-serving config for the CloudOps AI dashboard.
#
# The key line is `try_files`: for any request path that doesn't match a
# real file on disk (e.g. /incidents/abc-123, which react-router-dom
# handles client-side), fall back to index.html instead of returning a
# raw nginx 404. Without this, direct navigation or a hard refresh on any
# route other than "/" would break.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
