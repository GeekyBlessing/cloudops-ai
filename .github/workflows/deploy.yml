name: Deploy

# Manual trigger only, not "on: push: branches: [main]". This mirrors the
# project's human-gated-by-default posture elsewhere (CLOUDOPS_REMEDIATION_MODE
# defaults to dry_run; remediation actions require an HMAC-signed approval
# token) -- deploying a new image and infra changes to a real AWS account
# is exactly the kind of action that shouldn't happen automatically on
# every merge to main without a human deciding "yes, now." Pair this with
# a GitHub Environment (Settings -> Environments -> New environment, name
# it "aws-dev" to match the `environment:` key below) with required
# reviewers configured, for an actual approval gate enforced by GitHub
# itself -- that configuration is repo-settings-side and can't be
# expressed in this YAML file, same as the OIDC role setup below.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  # Lets this workflow exchange a short-lived GitHub-issued OIDC token for
  # temporary AWS credentials -- no long-lived AWS access keys stored as a
  # GitHub secret. Same mechanism as terraform-plan.yml, different role
  # (see the comment on "Configure AWS credentials" below for why).
  id-token: write

defaults:
  run:
    working-directory: infra/environments/dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: aws-dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      # Deliberately a DIFFERENT role from terraform-plan.yml's
      # AWS_GITHUB_ACTIONS_ROLE_ARN. That role only needs read access to
      # compute a plan and runs on every PR from any branch; this one needs
      # broad write access (dynamodb, iam, ecs, ecr, logs -- everything
      # this Terraform config manages) and only runs on a manual, reviewed
      # dispatch. Reusing the plan role here would mean any PR able to
      # trigger terraform-plan.yml could -- if that workflow were ever
      # compromised or misconfigured -- assume a role capable of mutating
      # production infrastructure. Two roles, two blast radii. This role
      # (and its AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN secret) needs one-time
      # AWS-side setup, same as the plan role -- see infra/README.md.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform init
        run: terraform init

      # Chicken-and-egg: the ecs module needs an image to already exist at
      # ecr.repository_url:image_tag, but the ECR repository itself has to
      # exist before anything can be pushed to it. Applying just the ecr
      # module first (idempotent -- a no-op if it already exists from a
      # previous run) breaks that cycle without a separate bootstrap
      # workflow. -target restricts this apply to ecr's resources only, so
      # it can't touch ecs/iam/dynamodb even by accident; the placeholder
      # image_tag value is never actually used for anything in this step.
      - name: Ensure ECR repository exists
        run: terraform apply -auto-approve -target=module.ecr -var="image_tag=bootstrap"

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR repository URL
        id: ecr-repo
        run: echo "url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend image only here -- the frontend is a static build (dist/),
      # not a container, so it never goes through ECR/build-push-action.
      # It's built a few steps down and synced straight to S3 once
      # module.frontend's bucket exists.
      #
      # Tagged with the exact commit SHA that triggered this workflow --
      # never "latest". Combined with the ecr module's IMMUTABLE tag
      # setting, this guarantees "what's running" can always be traced
      # back to an exact, unambiguous commit.
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.ecr-repo.outputs.url }}:${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # VITE_API_BASE_URL="" (empty string, not unset) deliberately -- see
      # frontend/src/api/client.ts's `?? "http://localhost:8000"` fallback.
      # `??` only falls back on null/undefined, not on an empty string, so
      # this makes every API call relative to whatever origin serves the
      # dashboard. That's exactly what's wanted now that CloudFront proxies
      # /health, /incidents*, and /remediation* to the ALB from the same
      # distribution that serves the dashboard itself (see
      # infra/modules/frontend/main.tf) -- same origin, no CORS, and no
      # need to know the CloudFront domain name at build time.
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ""

      - name: Terraform apply
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      # frontend_bucket_name/frontend_cloudfront_distribution_id only
      # exist after the apply above -- module.frontend's S3 bucket and
      # CloudFront distribution are created by that same step, not a
      # separate targeted bootstrap apply like ECR's, since there's no
      # chicken-and-egg problem here: the frontend build above doesn't
      # depend on anything Terraform creates.
      - name: Sync frontend build to S3
        run: aws s3 sync ../../../frontend/dist "s3://$(terraform output -raw frontend_bucket_name)" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "$(terraform output -raw frontend_cloudfront_distribution_id)" --paths "/*"

      - name: Summary
        run: |
          echo "Deployed ${{ steps.ecr-repo.outputs.url }}:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "ECS service: $(terraform output -raw ecs_service_name)" >> "$GITHUB_STEP_SUMMARY"
          echo "Dashboard: https://$(terraform output -raw cloudfront_domain_name)" >> "$GITHUB_STEP_SUMMARY"
